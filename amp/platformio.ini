; PlatformIO Project Configuration File
; ESP32 Audio Controller: UDA1334A + TDA7318 + ST7789 + RC-5 + Encoder + Buttons
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Upload speed
upload_speed = 921600

; CPU frequency
board_build.f_cpu = 240000000L

; Flash mode
board_build.flash_mode = qio

; Partition scheme - default with SPIFFS for fonts
board_build.partitions = huge_app.csv

; SPIFFS upload
board_build.filesystem = spiffs

; Enable PSRAM (if available)
board_build.psram_type = qspi
board_upload.maximum_ram_size = 524288

; Library dependencies
lib_deps =
    ; TFT Display
    bodmer/TFT_eSPI@^2.5.33

    ; IR Remote (RC-5) - для ESP32/ESP8266
    crankyoldgit/IRremoteESP8266@^2.9.0

    ; Encoder
    paulstoffregen/Encoder@^1.4.2

    ; Button handling
    mathertel/OneButton@^2.5.0

    ; JSON for Bluetooth SPP communication
    bblanchon/ArduinoJson@^7.0.0

    ; Bluetooth A2DP Audio
    https://github.com/pschatzmann/ESP32-A2DP.git

; Build flags
build_flags =
    ; Board configuration
    -DBOARD_HAS_PSRAM

    ; WiFi disabled (power saving)
    -DARDUINO_LOOPBACK_WIFI=0

    ; Bluetooth configuration
    -DCONFIG_BT_ENABLED=1
    -DCONFIG_BLUEDROID_ENABLED=1
    -DCONFIG_BT_SPP_ENABLED=1
    -DCONFIG_BT_A2DP_ENABLED=1

    ; FreeRTOS configuration
    -DconfigUSE_PREEMPTION=1
    -DconfigUSE_TIME_SLICING=1

    ; Heap debugging (optional, відключити для релізу)
    ;-DHEAP_DEBUG

    ; Serial debug (відключити для релізу)
    -DDEBUG_SERIAL

    ; ========== TFT_eSPI Конфігурація (ST7789 170x320) ==========
    -DUSER_SETUP_LOADED
    -DST7789_DRIVER
    -DTFT_WIDTH=170
    -DTFT_HEIGHT=320
    ; SPI піни (TFT_MISO не підключено)
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_CS=5
    -DTFT_DC=16
    -DTFT_RST=17
    -DTFT_BL=4
    ; Шрифти
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_FONT4
    -DLOAD_FONT6
    -DLOAD_FONT7
    -DLOAD_FONT8
    -DSMOOTH_FONT
    ; Частота SPI
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=16000000

    ; ========== Аудіо конфігурація ==========
    ; I2S піни для UDA1334A
    -DI2S_BCK_PIN=26
    -DI2S_WS_PIN=25
    -DI2S_DOUT_PIN=27

    ; I2C піни для TDA7318
    -DI2C_SDA_PIN=21
    -DI2C_SCL_PIN=22
    -DTDA7318_ADDRESS=0x44

    ; ========== Конфігурація вводу ==========
    ; Енкодер (підтяжка 12кОм до +3.3В)
    -DENCODER_CLK_PIN=14
    -DENCODER_DT_PIN=13
    -DENCODER_SW_PIN=19

    ; IR приймач (RC-5)
    -DIR_RECV_PIN=15

    ; Кнопки (підтяжка 12кОм до +3.3В)
    -DBTN_PWR_PIN=33
    -DBTN_UP_PIN=32
    -DBTN_DOWN_PIN=36
    -DBTN_LEFT_PIN=35
    -DBTN_OK_PIN=34
    -DBTN_RIGHT_PIN=39

    ; ========== System Configuration ==========
    ; Task priorities (FreeRTOS: higher number = higher priority)
    -DTASK_PRIORITY_BT_AUDIO=24
    -DTASK_PRIORITY_BT_CONTROL=20
    -DTASK_PRIORITY_TDA7318=16
    -DTASK_PRIORITY_DISPLAY=12
    -DTASK_PRIORITY_INPUT=8
    -DTASK_PRIORITY_SYSTEM=4

    ; Task stack sizes (in bytes)
    -DTASK_STACK_BT_AUDIO=4096
    -DTASK_STACK_BT_CONTROL=3072
    -DTASK_STACK_TDA7318=2048
    -DTASK_STACK_DISPLAY=4096
    -DTASK_STACK_INPUT=2048
    -DTASK_STACK_SYSTEM=2048

    ; Queue sizes
    -DQUEUE_SIZE_INPUT=20
    -DQUEUE_SIZE_DISPLAY=10
    -DQUEUE_SIZE_TDA7318=10
    -DQUEUE_SIZE_BT_CONTROL=10

; Build source filter
build_src_filter = +<*> -<.git/> -<.svn/>
