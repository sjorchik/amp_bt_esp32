; PlatformIO Project Configuration File
; ESP32 Audio Controller: UDA1334A + TDA7318 + ST7789 + RC-5 + Encoder + Buttons + Internet Radio
;
; Зміни від оригіналу:
;   - прибрано Bluetooth A2DP та SPP (замінено на Internet Radio та Web Interface)
;   - додано ESPAsyncWebServer для веб-інтерфейсу
;   - додано ESP32-Audio для інтернет-радіо
;   - додано ArduinoJson для парсингу JSON з веб-інтерфейсу
;   - додано -DCONFIG_BT_ENABLED=0 → повністю вимикаємо Bluetooth (~100KB)
;   - додано -Os для розміру бінарника

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Upload speed
upload_speed = 921600

; CPU frequency
board_build.f_cpu = 240000000L

; Flash mode
board_build.flash_mode = qio

; Partition scheme
board_build.partitions = huge_app.csv

; SPIFFS
board_build.filesystem = spiffs

; Enable PSRAM (якщо є на платі; на WROOM-32 без PSRAM — прибрати)
board_build.psram_type = qspi
board_upload.maximum_ram_size = 524288

; ── БІБЛІОТЕКИ ────────────────────────────────────────────────────────────
lib_deps =
    ; TFT Display
    bodmer/TFT_eSPI@^2.5.33

    ; IR Remote (RC-5)
    crankyoldgit/IRremoteESP8266@^2.9.0

    ; Encoder
    paulstoffregen/Encoder@^1.4.2

    ; Button handling
    mathertel/OneButton@^2.5.0

    ; ESP Async Web Server (Web Interface)
    https://github.com/me-no-dev/ESPAsyncWebServer.git

    ; ArduinoJson (для парсингу JSON з веб-інтерфейсу)
    bblanchon/ArduinoJson@^7.0.0

    ; ESP32 Audio (Internet Radio)
    https://github.com/pschatzmann/ESP32-A2DP.git

; ── BUILD FLAGS ───────────────────────────────────────────────────────────
build_flags =
    ; Розмір замість швидкості (зменшує бінарник, трохи звільняє flash)
    -Os

    ; Board configuration
    -DBOARD_HAS_PSRAM

    ; WiFi enabled (для веб-інтерфейсу та радіо)
    -DARDUINO_LOOPBACK_WIFI=1

    ; ── КЛЮЧОВІ ЗМІНИ ПАМ'ЯТІ ──────────────────────────────────────────
    ; Вимикаємо Bluetooth повністю (не використовується)
    ; Це звільняє ~100 KB пам'яті!
    -DCONFIG_BT_ENABLED=0
    -DCONFIG_BLUEDROID_ENABLED=0
    -DCONFIG_BT_CLASSIC_ENABLED=0
    -DCONFIG_BT_SPP_ENABLED=0
    -DCONFIG_BT_A2DP_ENABLED=0
    -DCONFIG_BT_BLE_ENABLED=0
    -DCONFIG_BT_CLASSIC_BLE_COEXIST=0
    ; ────────────────────────────────────────────────────────────────────

    ; FreeRTOS configuration
    -DconfigUSE_PREEMPTION=1
    -DconfigUSE_TIME_SLICING=1

    ; Debug (прибрати для release)
    -DDEBUG_SERIAL

    ; ========== TFT_eSPI (ST7789 170x320) ==========
    -DUSER_SETUP_LOADED
    -DST7789_DRIVER
    -DTFT_WIDTH=170
    -DTFT_HEIGHT=320
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_CS=5
    -DTFT_DC=16
    -DTFT_RST=17
    -DTFT_BL=4
    ; Шрифти — тільки потрібні (кожен LOAD_FONTX займає flash і трохи RAM)
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_FONT4
    -DLOAD_FONT6
    -DLOAD_FONT7
    -DLOAD_FONT8
    -DSMOOTH_FONT
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=16000000

    ; ========== Аудіо конфігурація ==========
    -DI2S_BCK_PIN=26
    -DI2S_WS_PIN=25
    -DI2S_DOUT_PIN=27

    ; I2C (TDA7318)
    -DI2C_SDA_PIN=21
    -DI2C_SCL_PIN=22
    -DTDA7318_ADDRESS=0x44

    ; ========== Вводу конфігурація ==========
    -DENCODER_CLK_PIN=14
    -DENCODER_DT_PIN=13
    -DENCODER_SW_PIN=19
    -DIR_RECV_PIN=15
    -DBTN_PWR_PIN=33
    -DBTN_UP_PIN=32
    -DBTN_DOWN_PIN=36
    -DBTN_LEFT_PIN=35
    -DBTN_OK_PIN=34
    -DBTN_RIGHT_PIN=39

    ; ========== FreeRTOS Task Config ==========
    -DTASK_PRIORITY_TDA7318=24
    -DTASK_PRIORITY_DISPLAY=20
    -DTASK_PRIORITY_INPUT=16
    -DTASK_PRIORITY_WEB_SERVER=12
    -DTASK_PRIORITY_AUDIO_PLAYER=8
    -DTASK_PRIORITY_SYSTEM=4

    -DTASK_STACK_TDA7318=4096
    -DTASK_STACK_DISPLAY=4096
    -DTASK_STACK_INPUT=2048
    -DTASK_STACK_WEB_SERVER=8192
    -DTASK_STACK_AUDIO_PLAYER=8192
    -DTASK_STACK_SYSTEM=2048

    -DQUEUE_SIZE_INPUT=20
    -DQUEUE_SIZE_DISPLAY=10
    -DQUEUE_SIZE_TDA7318=10
    -DQUEUE_SIZE_WEB_SERVER=20
    -DQUEUE_SIZE_AUDIO_PLAYER=10

build_src_filter = +<*> -<.git/> -<.svn/>
